<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orto — Dashboard Giardino</title>
  <meta name="description" content="Dashboard di monitoraggio dell'orto domestico con sensori e irrigazione">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1>🌿 Orto</h1>
      <div class="status-badge" id="status-badge">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Connessione...</span>
      </div>
    </div>
    <div class="header-right">
      <div class="last-update" id="last-update">—</div>
    </div>
    <p class="error-msg" id="error-msg">Impossibile connettersi a Home Assistant.</p>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav" id="tab-nav">
    <button class="tab-btn active" data-tab="mappa">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/></svg>
      Mappa
    </button>
    <button class="tab-btn" data-tab="sensori">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
      Sensori
    </button>
    <button class="tab-btn" data-tab="pompe">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
      Pompe
    </button>
  </nav>

  <!-- Mappa Tab -->
  <section class="tab-content active" id="tab-mappa">
    <div class="map-container">
      <div class="map-header">
        <h2>Mappa dell'Orto</h2>
        <div class="map-legend">
          <span class="legend-label">Batteria sensori:</span>
          <span class="legend-status-item"><span class="legend-status-dot high"></span>Carico</span>
          <span class="legend-status-item"><span class="legend-status-dot medium"></span>Medio</span>
          <span class="legend-status-item"><span class="legend-status-dot low"></span>Scarico</span>
          <span class="legend-status-item"><span class="legend-status-dot offline"></span>Offline</span>
        </div>
      </div>
      <div class="garden-map" id="garden-map">
        <!-- SVG Map will be generated by JS -->
      </div>
    </div>
  </section>

  <!-- Sensori Tab -->
  <section class="tab-content" id="tab-sensori">
    <div id="stazioni-container"></div>
  </section>

  <!-- Pompe Tab -->
  <section class="tab-content" id="tab-pompe">
    <div class="section-label">Controllo Pompe</div>
    <div class="pumps-grid" id="pompe-container"></div>
  </section>

</div>

<!-- Sensor Detail Modal -->
<div class="modal-overlay" id="sensor-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="modal-title">—</h3>
      <button class="modal-close" id="modal-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- Populated dynamically -->
    </div>
  </div>
</div>

<script src="token.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
